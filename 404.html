<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HMS — Loading</title>
  <!--
    GitHub Pages SPA Redirect Trick
    ================================
    GitHub Pages serves static files only. When a user navigates directly
    to a client-side route (e.g. /mini-hms/login) or refreshes the page,
    GitHub Pages returns this 404.html (instead of a real 404) because the
    file doesn't exist on disk.

    This script encodes the full path + query into a redirect back to the
    root index.html with the path stored as a query param (?p=/login).
    The index.html then reads that param and restores the route via
    history.replaceState before React Router initializes.

    Reference: https://github.com/rafgraph/spa-github-pages
  -->
  <script>
    // Get the base path for the repo (e.g. /mini-hms for GitHub Pages)
    var base = '/mini-hms';
    var path = window.location.pathname.slice(base.length) || '/';
    var search = window.location.search;
    var hash = window.location.hash;
    var redirectUrl = window.location.origin + base +
      '/?p=' + encodeURIComponent(path) +
      (search ? '&q=' + encodeURIComponent(search.slice(1)) : '') +
      hash;
    window.location.replace(redirectUrl);
  </script>
</head>
<body>
  <p style="font-family:sans-serif;text-align:center;margin-top:20vh;color:#666;">
    Redirecting...
  </p>
</body>
</html>
